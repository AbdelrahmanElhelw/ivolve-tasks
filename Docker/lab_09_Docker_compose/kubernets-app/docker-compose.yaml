services:
  

  app:
    build: .
    container_name: nodejs-app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: root
    volumes:
      - app_log:/app/log
    depends_on:
      - db


  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ivolve


    volumes:
      - db_data:/var/lib/mysql
    


volumes:
    db_data:
    app_log:
