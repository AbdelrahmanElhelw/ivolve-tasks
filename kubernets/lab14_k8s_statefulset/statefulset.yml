apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ivolve-statefulset
  namespace: ivolve
spec:
  serviceName: "headless-svc"
  replicas: 2
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node
                operator: In
                values:
                - worker
      containers:
      - name: mysql
        image: mysql:5.7
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ivolve-secret
              key: DB_ROOT_PASSWORD
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: ivolve-cm
              key: DB_HOST
        - name: MYSQL_USER
          valueFrom:
            configMapKeyRef:
              name: ivolve-cm
              key: DB_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: ivolve-cm
              key: DB_PASSWORD
        
        volumeMounts:
          - name: mysql-pvc
            mountPath: /var/lib/mysql
      tolerations:
        - key: "node"
          operator: "Equal"
          value: "worker"

  volumeClaimTemplates:
  - metadata:
      name: mysql-pvc
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

    
      

        
