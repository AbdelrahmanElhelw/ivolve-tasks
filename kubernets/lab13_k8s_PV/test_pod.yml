apiVersion: v1
kind: Pod
metadata:
  name: test-pod    
spec:
  containers:
  - name: test-container
    image: nginx
    ports:
    - containerPort: 80 
    volumeMounts:
    - name: test-volume
      mountPath: /usr/share/nginx/html

  volumes:
  - name: test-volume
    persistentVolumeClaim:
      claimName: my-pvc